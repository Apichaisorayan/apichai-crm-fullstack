name = "apichai-crm"
# account_id should be set via CLOUDFLARE_ACCOUNT_ID env variable or wrangler login
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Production Database (default - ใช้เมื่อ deploy)
[[d1_databases]]
binding = "DB"
database_name = "apichai-crm-prod"
database_id = "2e4f9fcd-9c3a-49c2-9fa9-8808ea80ca84"

# Development Environment (ใช้เมื่อ run local dev)
[env.dev]

[env.dev.vars]
# JWT_SECRET should be set via .dev.vars file, not committed to git
# JWT_SECRET = "your-secret-here"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "apichai-crm-local"
database_id = "371370af-5844-488b-a68d-bc898161416b" # ใช้ database_id จริงของ local

# QA Environment (ใช้สำหรับทดสอบแยกจาก production)
[env.qa]

[[env.qa.d1_databases]]
binding = "DB"
database_name = "apichai-crm-qa"
database_id = "local-qa-database-id"
